name: Build DownloadManager Application

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:

  linux:
    name: Ubuntu Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y build-essential wget rpm

      - name: Build
        run: make

      - name: Create tar.gz
        run: |
          mkdir release
          cp download-manager release/
          tar czf download-manager-linux-x86_64.tar.gz release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: download-manager-linux-x86_64.tar.gz

  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          install: gcc make wget

      - name: Build
        shell: msys2 {0}
        run: make

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: download-manager.exe

  macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wget
        run: brew install wget

      - name: Build
        run: make

      - name: Package
        run: |
          mkdir release
          cp download-manager release/
          tar czf download-manager-macos.tar.gz release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: download-manager-macos.tar.gz

  deb:
    name: Debian Package
    runs-on: ubuntu-latest
    needs: linux
    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt update
          sudo apt install -y build-essential dpkg-dev

      - run: make

      - name: Build deb
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          cp download-manager pkg/usr/bin/

          cat <<EOF > pkg/DEBIAN/control
          Package: download-manager
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Your Name <you@example.com>
          Description: Terminal Download Manager using wget
          EOF

          dpkg-deb --build pkg download-manager_1.0.0_amd64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: download-manager_1.0.0_amd64.deb

  rpm:
    name: RPM Package
    runs-on: ubuntu-latest
    needs: linux
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y rpm gcc make

      - name: Build binary
        run: make

      - name: Build RPM
        run: |
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp download-manager rpmbuild/SOURCES/download-manager
          chmod +x rpmbuild/SOURCES/download-manager

          cat <<'EOF' > rpmbuild/SPECS/download-manager.spec
          Name:           download-manager
          Version:        1.0.0
          Release:        1%{?dist}
          Summary:        Terminal Download Manager using wget
          License:        MIT
          Source0:        download-manager
          BuildArch:      x86_64
          Requires:       wget

          %description
          Terminal Download Manager using wget.

          %prep

          %build

          %install
          mkdir -p %{buildroot}/usr/bin
          install -m 0755 %{SOURCE0} %{buildroot}/usr/bin/download-manager

          %files
          /usr/bin/download-manager

          %changelog
          * Fri Jan 01 2024 Your Name <you@example.com> - 1.0.0-1
          - Initial RPM package
          EOF

          rpmbuild \
            --define "_topdir $(pwd)/rpmbuild" \
            -bb rpmbuild/SPECS/download-manager.spec

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: rpmbuild/RPMS/**/*.rpm

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, deb, rpm]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -laR dist

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.exe
            dist/*.deb
            dist/*.rpm
          generate_release_notes: true